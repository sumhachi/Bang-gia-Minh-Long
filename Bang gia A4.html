<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tính tiền photocopy A4</title>
<style>
body{
font-family: Arial;
background:#222;
color:white;
text-align:center;
padding:40px;
}
input{
font-size:20px;
padding:10px;
width:120px;
}
button{
font-size:18px;
padding:10px 20px;
background:orange;
border:none;
margin-top:10px;
}
#result{
font-size:24px;
margin-top:20px;
color:yellow;
}
</style>
</head>

<body>

<h2>Tính tiền photocopy A4</h2>

<input id="copies" type="number" placeholder="Số bản">

<br>

<button onclick="calc()">Tính tiền</button>

<div id="result"></div>

<script>

function calc(){

let n = parseInt(document.getElementById("copies").value);
let total = 0;

if(n>=1){
total += 1*2000;
}

if(n>1){
total += Math.min(n-1,9)*1000;
}

if(n>10){
total += Math.min(n-10,20)*800;
}

if(n>30){
total += Math.min(n-30,20)*600;
}

if(n>50){
total += Math.min(n-50,50)*500;
}

if(n>100){
total += (n-100)*400;
}

document.getElementById("result").innerHTML = 
"Tổng tiền: " + total.toLocaleString()+" đ";

}

</script>

</body>
</html>
